<!-- The frame is named here rather than inferred, so `/admin` paints the engine
     on the first render instead of flashing intake and correcting itself.
     `tests/test_surface.py::test_admin_page_serves` asserts the literal string
     "ENGINE" appears in this document — React renders at runtime and never
     reaches `res.text`, so the title and the noscript block below are what keep
     that route guarded. Don't remove them. -->
<div id="root" data-view="engine"></div>

<noscript>
  <p style="font-family:var(--font-sans);color:var(--muted);padding:2rem">
    AIRTIGHT / ENGINE needs JavaScript — the surface renders client-side against
    the JSON contract in surface/app.py. Every panel here is also readable
    directly: <code>/api/memory/stats</code>, <code>/api/ablation</code>,
    <code>/api/security</code>, <code>/api/throughput</code>, <code>/api/containment</code>.
  </p>
</noscript>
